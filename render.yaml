services:
  - type: web
    name: carcheck-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: MODEL_DRIVE_ID
        sync: false        # you fill this in on the Render dashboard
    disk:
      name: model-storage
      mountPath: /data
      sizeGB: 1
